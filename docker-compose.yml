name: web-tools

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    environment:
      DB_ENABLED: "false"
      ENVIRONMENT: local
    volumes:
      - ./backend/app:/app
    ports:
      - "127.0.0.1:9000:8000"

  backend-prod:
    profiles:
      - prod
    image: web-tools-backend-prod
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    restart: unless-stopped
    mem_limit: 512m
    environment:
      DB_ENABLED: "false"
      ENVIRONMENT: prod
    volumes:
      - backend_site_data:/app/site_data
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
      network: host
    environment:
      VITE_API_BASE: ""
      VITE_API_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    command: sh ./run-dev.sh
    ports:
      - "127.0.0.1:9001:80"
    depends_on:
      - backend

  frontend-prod:
    profiles:
      - prod
    image: web-tools-frontend-prod
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      network: host
      args:
        VITE_BASE_PATH: /web-tools/
    restart: unless-stopped
    mem_limit: 128m
    environment:
      VITE_API_BASE: /web-tools
    ports:
      - "0.0.0.0:9001:80"
    depends_on:
      - backend-prod

volumes:
  backend_site_data:
  frontend_node_modules:
